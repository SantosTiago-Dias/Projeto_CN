
services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SERVER_NAME=:80
    ports:
      - "8000:80"
    depends_on:
      - db

  db:
    container_name: db
    build:
      context: ./database
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./database/.env
    volumes:
      - db_data:/var/lib/mysql #nome do volume para guardar os dados
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql  #Nome do script para crias as tabelas
    healthcheck: #para ver se a BD esta viva
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  adminer:
    container_name: adminer
    image: adminer
    ports:
      - "8081:8080"

volumes:
  db_data: