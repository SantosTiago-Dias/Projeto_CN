version: "3.8"

services:
  proxy-manager:
    container_name: proxy-manager
    image: 'jc21/nginx-proxy-manager:latest'
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./data/npm:/data
      - ./data/letsencrypt:/etc/letsencrypt

  frontend:
    container_name: frontend
    image: ghcr.io/santostiago-dias/cloud-frontend:latest
    depends_on:
      - backend

  backend:
    container_name: backend
    image: ghcr.io/santostiago-dias/cloud-api:latest
    env_file: .env
    environment:
      - SERVER_NAME=:80
      - RUN_MIGRATIONS=true
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  queue-worker:
    container_name: queue-worker
    image: ghcr.io/santostiago-dias/cloud-api:latest
    command: php artisan queue:work --verbose --tries=3 --timeout=60
    env_file: .env
    depends_on: [db, redis, backend]
    restart: unless-stopped

  reverb:
    container_name: reverb
    image: ghcr.io/santostiago-dias/cloud-api:latest
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    env_file: .env
    depends_on: [db, redis, backend]

  db:
    container_name: db
    build:
      context: ./database
      dockerfile: Dockerfile
    restart: on-failure:3
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"

  adminer:
    container_name: adminer
    image: adminer
    ports:
      - "8081:8080"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    env_file: .env
    volumes:
      - ./minio_storage:/data
    command: server /data --console-address ":9001"
    restart: always
    depends_on:
      - db

volumes:
  db_data:
  backend_storage: